name: Test (local)

on:
  workflow_dispatch:
    inputs:
      shipyrd-url:
        description: "Base URL of your local Shipyrd instance."
        required: true

permissions:
  contents: read

jobs:
  test-pre-deploy:
    name: Test pre-deploy notification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run action (pre-deploy)
        uses: ./
        with:
          api-token: ${{ secrets.SHIPYRD_TOKEN }}
          shipyrd-url: ${{ inputs.shipyrd-url }}
          status: pre-deploy
          destination: staging

  test-post-deploy:
    name: Test post-deploy notification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run action (post-deploy, default status)
        uses: ./
        with:
          api-token: ${{ secrets.SHIPYRD_TOKEN }}
          shipyrd-url: ${{ inputs.shipyrd-url }}

  test-failed:
    name: Test failed notification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run action (failed)
        uses: ./
        with:
          api-token: ${{ secrets.SHIPYRD_TOKEN }}
          shipyrd-url: ${{ inputs.shipyrd-url }}
          status: failed
